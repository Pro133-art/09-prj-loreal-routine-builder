<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
      </header>

      <!-- Category Filter -->
      <!-- WHAT: Dropdown menu to select a product category
           WHY: Filters products so users see only what they're interested in
           HOW: When user selects an option, JavaScript listens for "change" event,
                filters all products, and displays matching ones
           Note: Option values must exactly match product.category in products.json
      -->
      <div class="search-section">
        <select id="categoryFilter">
          <option value="" disabled selected>Choose a Category</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="skincare">Skincare Serums & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
      </div>

      <!-- Products Grid -->
      <!-- WHAT: Container for product cards
           WHY: Shows filtered products in a nice grid layout
           HOW: JavaScript fills this with <button> elements for each product
                Users click buttons to select products
           Empty initially - JavaScript adds content dynamically
      -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <!-- WHAT: Shows which products user has chosen (as removable chips)
           WHY: Users need visual feedback of their selections
           HOW: When user clicks a product card, JavaScript adds/removes it from this area
                Each chip has an X button to remove it
                "Generate Routine" button creates an AI routine from selections
      -->
      <div class="selected-products">
        <h2>Selected Products</h2>
        <div id="selectedProductsList"></div>
        <button id="generateRoutine" class="generate-btn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
        </button>
      </div>

      <!------- Chat Area ------->
      <!-- WHAT: Main conversation interface with OpenAI chatbot
           WHY: Users can ask questions about products and get personalized advice
           HOW: User types a message → JavaScript sends to OpenAI API → Reply appears in chat
                Full conversation history is maintained so AI remembers context
      -->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <!-- Where messages appear (scrollable) -->
        <div id="chatWindow" class="chat-window"></div>

        <!-- Form for user to type and send messages -->
        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- SCRIPT LOADING ORDER IS IMPORTANT!
         1. secrets.js loads FIRST - defines open_api_key variable
         2. script.js loads SECOND - uses open_api_key to call OpenAI API
         
         If you reverse this order, script.js will try to use open_api_key before it exists (error!)
    -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
